apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-checker
  namespace: healthcare
  labels:
    app: ai-symptom-checker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-checker
  template:
    metadata:
      labels:
        app: ai-symptom-checker
    spec:
      containers:
        - name: ai-symptom-checker
          image: healthcare/ai-symptom-checker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3007
          env:
            - name: PORT
              value: "3007"
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: MONGODB_URI_SYMPTOM
            - name: JWT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: JWT_SECRET
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: OPENAI_API_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-checker
  namespace: healthcare
spec:
  selector:
    app: ai-symptom-checker
  ports:
    - port: 3007
      targetPort: 3007
  type: ClusterIP
